<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahdi Sharbaf | Digital Card</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], },
                    colors: {
                        dark: { bg: '#0f172a', text: '#f8fafc', muted: '#94a3b8' },
                        accent: { blue: '#38bdf8', purple: '#818cf8', green: '#4ade80' }
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(20px, -30px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f172a; overscroll-behavior-y: none; }
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-dark-text min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Animated Background Elements -->
    <div class="fixed inset-0 w-full h-full pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-accent-blue/30 rounded-full mix-blend-screen filter blur-[80px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[300px] h-[300px] bg-accent-purple/30 rounded-full mix-blend-screen filter blur-[80px] animate-blob" style="animation-delay: 2s;"></div>
    </div>

    <!-- Card Container -->
    <div class="glass w-full max-w-sm rounded-[2.5rem] p-8 flex flex-col items-center relative z-10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-t border-white/20">
        
        <!-- Profile Section -->
        <div class="relative w-28 h-28 mb-4">
            <div class="absolute inset-0 rounded-full border-2 border-accent-blue/50 animate-pulse-slow"></div>
            <img src="small.jpg" alt="Mahdi Sharbaf" class="w-full h-full rounded-full object-cover border-4 border-dark-bg relative z-10 shadow-xl" onerror="this.src='https://ui-avatars.com/api/?name=Mahdi+Sharbaf&size=160&background=38bdf8&color=fff'">
            <!-- Status Badge -->
            <div class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 border-2 border-dark-bg rounded-full z-20 shadow-[0_0_10px_rgba(74,222,128,0.5)]"></div>
        </div>

        <h1 class="text-2xl font-extrabold mb-1 text-center leading-tight">Mahdi Sharbaf</h1>
        <p class="text-accent-blue font-medium text-sm tracking-wide mb-6 text-center uppercase">Cloud & DevOps Engineer</p>

        <!-- QR Code Section -->
        <div class="bg-white p-3 rounded-2xl shadow-inner border-4 border-white/10 mb-6 transform hover:scale-105 transition-transform">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://mahdi-sharbaf.me&margin=0&color=0f172a" 
                 alt="Portfolio QR Code" 
                 class="w-48 h-48 rounded-lg">
        </div>

        <div class="flex items-center gap-2 text-white/80 text-sm font-semibold mb-8 uppercase tracking-widest">
            <i class="fas fa-arrow-up animate-bounce text-accent-blue"></i>
            Scan for Portfolio
            <i class="fas fa-arrow-up animate-bounce text-accent-blue"></i>
        </div>

        <!-- Social Links -->
        <div class="flex items-center justify-center gap-4 w-full">
            <a href="https://linkedin.com/in/mahdi-sharbaf-movassaghpour" target="_blank" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xl text-gray-300 hover:bg-[#0A66C2] hover:text-white hover:border-transparent transition-all shadow-lg">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://github.com/mahdisharbaf" target="_blank" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xl text-gray-300 hover:bg-white hover:text-black hover:border-transparent transition-all shadow-lg">
                <i class="fab fa-github"></i>
            </a>
            <a href="mailto:mehdi.sharbaf187@gmail.com" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xl text-gray-300 hover:bg-red-500 hover:text-white hover:border-transparent transition-all shadow-lg">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="tel:+4915736980335" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xl text-gray-300 hover:bg-green-500 hover:text-white hover:border-transparent transition-all shadow-lg">
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>

        <!-- Action Button -->
        <a href="https://mahdi-sharbaf.me/Lebenslauf.pdf" class="mt-8 w-full py-3 rounded-xl bg-gradient-to-r from-accent-blue to-accent-purple text-dark-bg font-bold text-center hover:opacity-90 transition-opacity shadow-[0_0_15px_rgba(56,189,248,0.4)]">
            <i class="fas fa-file-pdf mr-2"></i> CV Herunterladen
        </a>

    </div>

</body>
</html>
